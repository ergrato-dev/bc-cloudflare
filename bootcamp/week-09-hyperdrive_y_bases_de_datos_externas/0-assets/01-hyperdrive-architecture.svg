<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <defs>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F38020"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="38" fill="#ffffff" font-family="Inter, Roboto, sans-serif" font-size="18" font-weight="600" text-anchor="middle">Hyperdrive — Connection Pooling en el Edge</text>

  <!-- Cloudflare Edge Zone boundary -->
  <rect x="185" y="65" width="520" height="260" rx="10" fill="#16213e" stroke="#F38020" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.9"/>
  <text x="445" y="86" fill="#F38020" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="500" text-anchor="middle" opacity="0.8">Cloudflare Edge</text>

  <!-- Client box -->
  <rect x="20" y="165" width="120" height="70" rx="8" fill="#252540" stroke="#6b7280" stroke-width="1.5"/>
  <text x="80" y="198" fill="#e5e7eb" font-family="Inter, Roboto, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Cliente</text>
  <text x="80" y="216" fill="#9ca3af" font-family="Inter, Roboto, sans-serif" font-size="11" text-anchor="middle">Browser / App</text>

  <!-- Worker box -->
  <rect x="215" y="140" width="170" height="120" rx="8" fill="#1a1a2e" stroke="#F38020" stroke-width="2"/>
  <text x="300" y="168" fill="#F38020" font-family="Inter, Roboto, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Worker</text>
  <text x="300" y="188" fill="#d1d5db" font-family="Inter, Roboto, sans-serif" font-size="11" text-anchor="middle">Hono + TypeScript</text>
  <text x="300" y="208" fill="#6b7280" font-family="Inter, Roboto, sans-serif" font-size="10" text-anchor="middle">V8 Isolate</text>
  <text x="300" y="226" fill="#6b7280" font-family="Inter, Roboto, sans-serif" font-size="10" text-anchor="middle">Sin socket TCP nativo</text>

  <!-- Hyperdrive box -->
  <rect x="455" y="110" width="210" height="175" rx="8" fill="#1a1a2e" stroke="#F38020" stroke-width="2"/>
  <text x="560" y="137" fill="#F38020" font-family="Inter, Roboto, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Hyperdrive</text>
  <text x="560" y="156" fill="#d1d5db" font-family="Inter, Roboto, sans-serif" font-size="11" text-anchor="middle">Connection Pooler</text>
  <text x="560" y="178" fill="#9ca3af" font-family="Inter, Roboto, sans-serif" font-size="10" text-anchor="middle">Pool TCP persistente</text>
  <rect x="475" y="184" width="170" height="8" rx="4" fill="#003682"/>
  <rect x="475" y="198" width="170" height="8" rx="4" fill="#003682" opacity="0.75"/>
  <rect x="475" y="212" width="170" height="8" rx="4" fill="#003682" opacity="0.5"/>
  <rect x="475" y="226" width="170" height="8" rx="4" fill="#003682" opacity="0.3"/>
  <rect x="475" y="240" width="170" height="8" rx="4" fill="#003682" opacity="0.15"/>
  <text x="560" y="270" fill="#6b7280" font-family="Inter, Roboto, sans-serif" font-size="10" text-anchor="middle">~10 conexiones activas</text>

  <!-- PostgreSQL box -->
  <rect x="755" y="160" width="130" height="80" rx="8" fill="#1a1a2e" stroke="#003682" stroke-width="2"/>
  <text x="820" y="194" fill="#60a5fa" font-family="Inter, Roboto, sans-serif" font-size="13" font-weight="700" text-anchor="middle">PostgreSQL</text>
  <text x="820" y="212" fill="#9ca3af" font-family="Inter, Roboto, sans-serif" font-size="11" text-anchor="middle">DB externa</text>
  <text x="820" y="228" fill="#6b7280" font-family="Inter, Roboto, sans-serif" font-size="10" text-anchor="middle">Neon · RDS · Supabase</text>

  <!-- Arrow: Client -> Worker (HTTP Request) -->
  <line x1="140" y1="195" x2="213" y2="195" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="176" y="190" fill="#9ca3af" font-family="Inter, Roboto, sans-serif" font-size="10" text-anchor="middle">HTTP</text>

  <!-- Arrow: Worker -> Client (Response) -->
  <line x1="213" y1="212" x2="140" y2="212" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="176" y="228" fill="#9ca3af" font-family="Inter, Roboto, sans-serif" font-size="10" text-anchor="middle">Response</text>

  <!-- Arrow: Worker -> Hyperdrive -->
  <line x1="385" y1="200" x2="453" y2="200" stroke="#F38020" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="419" y="193" fill="#F38020" font-family="Inter, Roboto, sans-serif" font-size="10" text-anchor="middle">HTTP</text>
  <text x="419" y="214" fill="#F38020" font-family="Inter, Roboto, sans-serif" font-size="9" text-anchor="middle">connectionString</text>

  <!-- Arrows: Hyperdrive -> PostgreSQL (TCP Pool) -->
  <line x1="665" y1="192" x2="753" y2="192" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="665" y1="201" x2="753" y2="201" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.6"/>
  <line x1="665" y1="210" x2="753" y2="210" stroke="#60a5fa" stroke-width="1" marker-end="url(#arrow-blue)" opacity="0.35"/>
  <text x="709" y="188" fill="#60a5fa" font-family="Inter, Roboto, sans-serif" font-size="10" text-anchor="middle">TCP Pool</text>

  <!-- Dashed red: Worker can't connect TCP directly to PostgreSQL -->
  <line x1="300" y1="260" x2="300" y2="345" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.65"/>
  <line x1="300" y1="345" x2="820" y2="345" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.65"/>
  <line x1="820" y1="345" x2="820" y2="242" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.65" marker-end="url(#arrow-red)"/>
  <text x="560" y="340" fill="#ef4444" font-family="Inter, Roboto, sans-serif" font-size="11" text-anchor="middle" opacity="0.8">&#10060;  Workers no puede conectar TCP directamente</text>

  <!-- Footer note -->
  <text x="20" y="400" fill="#4b5563" font-family="Inter, Roboto, sans-serif" font-size="10">Hyperdrive mantiene conexiones TCP persistentes en el PoP más cercano al DB, eliminando el overhead de handshake TCP/TLS por request.</text>
</svg>
