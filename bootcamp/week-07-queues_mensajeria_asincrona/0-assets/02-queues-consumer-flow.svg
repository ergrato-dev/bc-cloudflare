<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440" font-family="Inter, Roboto, system-ui, sans-serif">

  <!-- Fondo principal -->
  <rect width="800" height="440" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="400" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">Flujo del Consumidor — ack, retry y batch</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#A0AEC0">Handler queue() · MessageBatch · operaciones por mensaje</text>

  <!-- ======= QUEUE (entrada) ======= -->
  <rect x="30" y="90" width="150" height="100" rx="10" fill="#16213e" stroke="#F38020" stroke-width="2"/>
  <text x="105" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#F38020">Queue</text>
  <line x1="46" y1="128" x2="164" y2="128" stroke="#2D3748" stroke-width="1"/>
  <text x="105" y="146" text-anchor="middle" font-size="11" fill="#A0AEC0">msg 1</text>
  <text x="105" y="162" text-anchor="middle" font-size="11" fill="#A0AEC0">msg 2</text>
  <text x="105" y="178" text-anchor="middle" font-size="11" fill="#A0AEC0">msg 3</text>

  <!-- ======= WORKER HANDLER ======= -->
  <rect x="250" y="80" width="200" height="120" rx="10" fill="#F38020"/>
  <text x="350" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">async queue(batch)</text>
  <text x="350" y="128" text-anchor="middle" font-size="11" fill="#FFFFFF">for (msg of batch.messages)</text>
  <text x="350" y="146" text-anchor="middle" font-size="11" fill="#FFFFFF">  await process(msg.body)</text>
  <text x="350" y="164" text-anchor="middle" font-size="11" fill="#FFFFFF">  msg.ack()</text>
  <text x="350" y="182" text-anchor="middle" font-size="11" fill="#FFFFFF">// catch → msg.retry()</text>

  <!-- ======= RESULTADO ACK ======= -->
  <rect x="530" y="70" width="150" height="60" rx="10" fill="#16213e" stroke="#2D3748" stroke-width="1.5"/>
  <text x="605" y="94" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">ack()</text>
  <text x="605" y="114" text-anchor="middle" font-size="11" fill="#A0AEC0">Mensaje eliminado</text>
  <text x="605" y="130" text-anchor="middle" font-size="11" fill="#A0AEC0">de la queue</text>

  <!-- ======= RESULTADO RETRY ======= -->
  <rect x="530" y="165" width="150" height="60" rx="10" fill="#16213e" stroke="#2D3748" stroke-width="1.5"/>
  <text x="605" y="189" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">retry()</text>
  <text x="605" y="209" text-anchor="middle" font-size="11" fill="#A0AEC0">Mensaje devuelto</text>
  <text x="605" y="225" text-anchor="middle" font-size="11" fill="#A0AEC0">a la queue</text>

  <!-- ======= FLECHAS ======= -->
  <!-- Queue → Handler -->
  <line x1="180" y1="140" x2="248" y2="140" stroke="#F38020" stroke-width="2" marker-end="url(#arr-q-o)"/>
  <text x="213" y="132" text-anchor="middle" font-size="10" fill="#F38020">batch</text>

  <!-- Handler → ack -->
  <line x1="450" y1="120" x2="528" y2="105" stroke="#FFFFFF" stroke-width="1.5" marker-end="url(#arr-q-w)"/>
  <text x="489" y="105" text-anchor="middle" font-size="10" fill="#FFFFFF">éxito</text>

  <!-- Handler → retry -->
  <line x1="450" y1="165" x2="528" y2="190" stroke="#A0AEC0" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-q-g)"/>
  <text x="489" y="188" text-anchor="middle" font-size="10" fill="#A0AEC0">falla</text>

  <!-- ======= OPERACIONES DE BATCH ======= -->
  <rect x="30" y="270" width="350" height="130" rx="8" fill="#16213e" stroke="#2D3748" stroke-width="1.5"/>
  <text x="50" y="294" font-size="12" font-weight="700" fill="#FFFFFF">Operaciones de batch completo</text>
  <line x1="46" y1="304" x2="364" y2="304" stroke="#2D3748" stroke-width="1"/>
  <text x="50" y="322" font-size="11" fill="#F38020">batch.ackAll()</text>
  <text x="50" y="340" font-size="11" fill="#A0AEC0">  Todos los mensajes procesados — más eficiente</text>
  <text x="50" y="362" font-size="11" fill="#F38020">batch.retryAll()</text>
  <text x="50" y="380" font-size="11" fill="#A0AEC0">  Todos deben reintentarse (ej. DB inaccesible)</text>

  <!-- ======= DELAY ======= -->
  <rect x="420" y="270" width="360" height="130" rx="8" fill="#16213e" stroke="#2D3748" stroke-width="1.5"/>
  <text x="440" y="294" font-size="12" font-weight="700" fill="#FFFFFF">delaySeconds</text>
  <line x1="436" y1="304" x2="764" y2="304" stroke="#2D3748" stroke-width="1"/>
  <text x="440" y="322" font-size="11" fill="#A0AEC0">Al producir: send(body, { delaySeconds: 300 })</text>
  <text x="440" y="340" font-size="11" fill="#A0AEC0">Al reintentar: msg.retry({ delaySeconds: 60 })</text>
  <text x="440" y="362" font-size="11" fill="#A0AEC0">Máximo: 43200 segundos (12 horas)</text>
  <text x="440" y="380" font-size="11" fill="#A0AEC0">Sin delay: entrega tan pronto como sea posible</text>

  <!-- ======= MARCADORES ======= -->
  <defs>
    <marker id="arr-q-o" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F38020"/>
    </marker>
    <marker id="arr-q-w" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FFFFFF"/>
    </marker>
    <marker id="arr-q-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#A0AEC0"/>
    </marker>
  </defs>

</svg>
