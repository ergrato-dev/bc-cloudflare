<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" width="820" height="440">
  <!-- Fondo -->
  <rect width="820" height="440" fill="#1a1a2e"/>

  <!-- Título -->
  <rect x="0" y="0" width="820" height="48" fill="#16213e"/>
  <text x="410" y="30" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">D1 — SQLite en el Edge · Arquitectura</text>
  <text x="410" y="43" font-family="system-ui, sans-serif" font-size="11" fill="#A0AEC0" text-anchor="middle">Semana 05 · prepare · bind · first · all · run · batch</text>

  <!-- ============================== -->
  <!-- CLIENTE -->
  <!-- ============================== -->
  <rect x="20" y="80" width="110" height="56" rx="8" fill="#16213e" stroke="#2D3748" stroke-width="1.5"/>
  <text x="75" y="106" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Cliente</text>
  <text x="75" y="123" font-family="system-ui, sans-serif" font-size="10" fill="#63B3ED" text-anchor="middle">HTTP Request</text>

  <!-- Arrow Client → Worker -->
  <line x1="130" y1="108" x2="200" y2="108" stroke="#F38020" stroke-width="1.5"/>
  <polygon points="204,108 196,104 196,112" fill="#F38020"/>
  <text x="165" y="102" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">GET /movies</text>

  <!-- ============================== -->
  <!-- WORKER -->
  <!-- ============================== -->
  <rect x="205" y="60" width="200" height="210" rx="8" fill="#F38020" fill-opacity="0.12" stroke="#F38020" stroke-width="2"/>
  <rect x="205" y="60" width="200" height="32" rx="8" fill="#F38020" fill-opacity="0.30"/>
  <rect x="205" y="80" width="200" height="12" fill="#F38020" fill-opacity="0.30"/>
  <text x="305" y="80" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#F38020" text-anchor="middle">Worker</text>

  <!-- Query boxes inside worker -->
  <rect x="218" y="98" width="176" height="30" rx="5" fill="#16213e" stroke="#2D3748" stroke-width="1"/>
  <text x="306" y="114" font-family="system-ui, sans-serif" font-size="9.5" fill="#FFFFFF" text-anchor="middle">DB.prepare("SELECT * FROM movies")</text>

  <rect x="218" y="134" width="176" height="30" rx="5" fill="#16213e" stroke="#2D3748" stroke-width="1"/>
  <text x="306" y="150" font-family="system-ui, sans-serif" font-size="9.5" fill="#FFFFFF" text-anchor="middle">.bind(id)</text>

  <rect x="218" y="170" width="86" height="28" rx="5" fill="#16213e" stroke="#38A169" stroke-width="1"/>
  <text x="261" y="187" font-family="system-ui, sans-serif" font-size="9" fill="#38A169" text-anchor="middle">.first&lt;Movie&gt;()</text>

  <rect x="310" y="170" width="84" height="28" rx="5" fill="#16213e" stroke="#63B3ED" stroke-width="1"/>
  <text x="352" y="187" font-family="system-ui, sans-serif" font-size="9" fill="#63B3ED" text-anchor="middle">.all&lt;Movie&gt;()</text>

  <rect x="218" y="205" width="176" height="28" rx="5" fill="#16213e" stroke="#9F7AEA" stroke-width="1"/>
  <text x="306" y="221" font-family="system-ui, sans-serif" font-size="9.5" fill="#9F7AEA" text-anchor="middle">DB.batch([stmt1, stmt2])</text>

  <rect x="218" y="239" width="176" height="24" rx="5" fill="#16213e" stroke="#2D3748" stroke-width="1"/>
  <text x="306" y="255" font-family="system-ui, sans-serif" font-size="9.5" fill="#A0AEC0" text-anchor="middle">.run() → { success, meta }</text>

  <!-- Arrow Worker → D1 -->
  <line x1="405" y1="165" x2="465" y2="165" stroke="#003682" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="469,165 461,161 461,169" fill="#003682"/>
  <text x="436" y="159" font-family="system-ui, sans-serif" font-size="9" fill="#63B3ED" text-anchor="middle">SQL query</text>

  <!-- Arrow D1 → Worker -->
  <line x1="465" y1="185" x2="405" y2="185" stroke="#38A169" stroke-width="1.5"/>
  <polygon points="401,185 409,181 409,189" fill="#38A169"/>
  <text x="436" y="199" font-family="system-ui, sans-serif" font-size="9" fill="#38A169" text-anchor="middle">rows / null</text>

  <!-- Arrow Worker → Client (response) -->
  <line x1="205" y1="108" x2="130" y2="108" stroke="#38A169" stroke-width="1.5"/>
  <polygon points="126,108 134,104 134,112" fill="#38A169"/>

  <!-- ============================== -->
  <!-- D1 DATABASE -->
  <!-- ============================== -->
  <rect x="470" y="60" width="230" height="210" rx="8" fill="#003682" fill-opacity="0.2" stroke="#003682" stroke-width="2"/>
  <rect x="470" y="60" width="230" height="32" rx="8" fill="#003682" fill-opacity="0.5"/>
  <rect x="470" y="80" width="230" height="12" fill="#003682" fill-opacity="0.5"/>
  <text x="585" y="80" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">D1 Database</text>
  <text x="585" y="94" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">SQLite · WAL mode</text>

  <!-- Tables -->
  <rect x="485" y="104" width="200" height="22" rx="4" fill="#16213e"/>
  <text x="495" y="119" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#9F7AEA">TABLE movies</text>
  <text x="673" y="119" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="end">id, title, director, genre</text>

  <rect x="485" y="130" width="200" height="22" rx="4" fill="#16213e"/>
  <text x="495" y="145" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#9F7AEA">INDEX idx_genre</text>
  <text x="673" y="145" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="end">movies(genre)</text>

  <rect x="485" y="156" width="200" height="22" rx="4" fill="#16213e"/>
  <text x="495" y="171" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#9F7AEA">TABLE d1_migrations</text>
  <text x="673" y="171" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="end">versiones aplicadas</text>

  <text x="585" y="210" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">Máx: 10 GB · SQLite 3.x</text>
  <text x="585" y="224" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">5 000 req/s · 50 000 filas leídas/req</text>
  <text x="585" y="238" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">Replicación automática a PoPs</text>
  <text x="585" y="254" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">Primary + Read Replicas</text>

  <!-- ============================== -->
  <!-- BOTTOM — REPLICATION -->
  <!-- ============================== -->
  <rect x="20" y="298" width="780" height="110" rx="8" fill="#16213e" stroke="#2D3748" stroke-width="1"/>
  <text x="410" y="318" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">Replicación D1 — Primary + Read Replicas</text>

  <rect x="40" y="328" width="160" height="60" rx="6" fill="#F38020" fill-opacity="0.15" stroke="#F38020" stroke-width="1.5"/>
  <text x="120" y="347" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#F38020" text-anchor="middle">Primary (Write)</text>
  <text x="120" y="363" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">INSERT / UPDATE / DELETE</text>
  <text x="120" y="379" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">Single-region master</text>

  <rect x="230" y="328" width="160" height="60" rx="6" fill="#003682" fill-opacity="0.3" stroke="#003682" stroke-width="1"/>
  <text x="310" y="347" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Read Replica EU</text>
  <text x="310" y="363" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">SELECT — lecturas locales</text>
  <text x="310" y="379" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">~1 ms latencia</text>

  <rect x="420" y="328" width="160" height="60" rx="6" fill="#003682" fill-opacity="0.3" stroke="#003682" stroke-width="1"/>
  <text x="500" y="347" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Read Replica APAC</text>
  <text x="500" y="363" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">SELECT — lecturas locales</text>
  <text x="500" y="379" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">~1 ms latencia</text>

  <rect x="610" y="328" width="170" height="60" rx="6" fill="#003682" fill-opacity="0.3" stroke="#003682" stroke-width="1"/>
  <text x="695" y="347" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Read Replica AMER</text>
  <text x="695" y="363" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">SELECT — lecturas locales</text>
  <text x="695" y="379" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">~1 ms latencia</text>

  <!-- Footer -->
  <rect x="0" y="418" width="820" height="22" fill="#16213e"/>
  <text x="410" y="433" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">Escrituras van al Primary · Lecturas se sirven desde la réplica más cercana al Worker</text>
</svg>
