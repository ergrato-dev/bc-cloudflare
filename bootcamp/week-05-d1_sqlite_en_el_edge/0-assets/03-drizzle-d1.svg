<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420">
  <!-- Fondo -->
  <rect width="820" height="420" fill="#1a1a2e"/>

  <!-- Título -->
  <rect x="0" y="0" width="820" height="48" fill="#16213e"/>
  <text x="410" y="30" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">DrizzleORM + D1 — Schema → Queries Type-Safe</text>
  <text x="410" y="43" font-family="system-ui, sans-serif" font-size="11" fill="#A0AEC0" text-anchor="middle">Semana 05 · sqliteTable · $inferSelect · drizzle(DB) · select · insert · update · delete</text>

  <!-- ============================== -->
  <!-- PANEL 1: Schema Definition -->
  <!-- ============================== -->
  <rect x="20" y="60" width="250" height="310" rx="8" fill="#16213e" stroke="#2D3748" stroke-width="1.5"/>
  <rect x="20" y="60" width="250" height="30" rx="8" fill="#2D3748"/>
  <rect x="20" y="79" width="250" height="11" fill="#2D3748"/>
  <text x="145" y="79" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">src/db/schema.ts</text>

  <text x="34" y="108" font-family="system-ui, sans-serif" font-size="9" fill="#9F7AEA">import</text>
  <text x="60" y="108" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">{ sqliteTable, text,</text>
  <text x="34" y="121" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">  integer, real }</text>
  <text x="34" y="134" font-family="system-ui, sans-serif" font-size="9" fill="#9F7AEA">from</text>
  <text x="61" y="134" font-family="system-ui, sans-serif" font-size="9" fill="#F6AD55">'drizzle-orm/sqlite-core'</text>

  <text x="34" y="154" font-family="system-ui, sans-serif" font-size="9" fill="#9F7AEA">export const</text>
  <text x="102" y="154" font-family="system-ui, sans-serif" font-size="9" fill="#63B3ED">games</text>
  <text x="128" y="154" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">=</text>

  <text x="34" y="167" font-family="system-ui, sans-serif" font-size="9" fill="#38A169">  sqliteTable(</text>
  <text x="110" y="167" font-family="system-ui, sans-serif" font-size="9" fill="#F6AD55">"games"</text>
  <text x="148" y="167" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">, {</text>

  <text x="44" y="180" font-family="system-ui, sans-serif" font-size="9" fill="#63B3ED">id:</text>
  <text x="62" y="180" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">integer("id").primaryKey(</text>
  <text x="44" y="193" font-family="system-ui, sans-serif" font-size="9" fill="#63B3ED">title:</text>
  <text x="72" y="193" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">text("title").notNull(),</text>
  <text x="44" y="206" font-family="system-ui, sans-serif" font-size="9" fill="#63B3ED">genre:</text>
  <text x="74" y="206" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">text("genre").notNull(),</text>
  <text x="44" y="219" font-family="system-ui, sans-serif" font-size="9" fill="#63B3ED">price:</text>
  <text x="72" y="219" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">real("price").notNull(),</text>
  <text x="34" y="232" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">});</text>

  <line x1="34" y1="245" x2="256" y2="245" stroke="#2D3748" stroke-width="1"/>

  <text x="34" y="261" font-family="system-ui, sans-serif" font-size="9" fill="#9F7AEA">export type</text>
  <text x="94" y="261" font-family="system-ui, sans-serif" font-size="9" fill="#63B3ED">Game</text>
  <text x="114" y="261" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">= typeof games</text>
  <text x="34" y="274" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">  .</text>
  <text x="43" y="274" font-family="system-ui, sans-serif" font-size="9" fill="#F6AD55">$inferSelect</text>

  <text x="34" y="290" font-family="system-ui, sans-serif" font-size="9" fill="#9F7AEA">export type</text>
  <text x="94" y="290" font-family="system-ui, sans-serif" font-size="9" fill="#63B3ED">NewGame</text>
  <text x="131" y="290" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">= typeof games</text>
  <text x="34" y="303" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">  .</text>
  <text x="43" y="303" font-family="system-ui, sans-serif" font-size="9" fill="#F6AD55">$inferInsert</text>

  <!-- ============================== -->
  <!-- PANEL 2: Queries -->
  <!-- ============================== -->
  <rect x="290" y="60" width="270" height="310" rx="8" fill="#16213e" stroke="#F38020" stroke-width="1.5"/>
  <rect x="290" y="60" width="270" height="30" rx="8" fill="#F38020" fill-opacity="0.3"/>
  <rect x="290" y="79" width="270" height="11" fill="#F38020" fill-opacity="0.3"/>
  <text x="425" y="79" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#F38020" text-anchor="middle">src/index.ts — queries</text>

  <text x="304" y="105" font-family="system-ui, sans-serif" font-size="9" fill="#9F7AEA">import</text>
  <text x="330" y="105" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">{ drizzle } from</text>
  <text x="304" y="118" font-family="system-ui, sans-serif" font-size="9" fill="#F6AD55">  'drizzle-orm/d1'</text>

  <text x="304" y="135" font-family="system-ui, sans-serif" font-size="9" fill="#9F7AEA">const</text>
  <text x="330" y="135" font-family="system-ui, sans-serif" font-size="9" fill="#63B3ED">db</text>
  <text x="344" y="135" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">= drizzle(c.env.DB)</text>

  <!-- SELECT -->
  <rect x="304" y="148" width="242" height="12" rx="3" fill="#38A169" fill-opacity="0.15"/>
  <text x="310" y="158" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#38A169">SELECT all</text>
  <text x="304" y="172" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">await db.select().from(games)</text>

  <!-- SELECT WHERE -->
  <rect x="304" y="182" width="242" height="12" rx="3" fill="#38A169" fill-opacity="0.15"/>
  <text x="310" y="192" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#38A169">SELECT por ID</text>
  <text x="304" y="206" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">const [g] = await db.select()</text>
  <text x="304" y="219" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">  .from(games).where(eq(games.id, id))</text>

  <!-- INSERT -->
  <rect x="304" y="232" width="242" height="12" rx="3" fill="#63B3ED" fill-opacity="0.15"/>
  <text x="310" y="242" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#63B3ED">INSERT</text>
  <text x="304" y="256" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">const [created] = await db</text>
  <text x="304" y="269" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">  .insert(games).values(data).returning()</text>

  <!-- UPDATE -->
  <rect x="304" y="282" width="242" height="12" rx="3" fill="#F6AD55" fill-opacity="0.15"/>
  <text x="310" y="292" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#F6AD55">UPDATE</text>
  <text x="304" y="306" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">await db.update(games).set({ price })</text>
  <text x="304" y="319" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">  .where(eq(games.id, id))</text>

  <!-- DELETE -->
  <rect x="304" y="330" width="242" height="12" rx="3" fill="#E53E3E" fill-opacity="0.15"/>
  <text x="310" y="340" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#E53E3E">DELETE</text>
  <text x="304" y="354" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">await db.delete(games)</text>
  <text x="304" y="367" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">  .where(eq(games.id, id))</text>

  <!-- ============================== -->
  <!-- PANEL 3: Type Inference -->
  <!-- ============================== -->
  <rect x="580" y="60" width="220" height="310" rx="8" fill="#16213e" stroke="#9F7AEA" stroke-width="1.5"/>
  <rect x="580" y="60" width="220" height="30" rx="8" fill="#9F7AEA" fill-opacity="0.25"/>
  <rect x="580" y="79" width="220" height="11" fill="#9F7AEA" fill-opacity="0.25"/>
  <text x="690" y="79" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#9F7AEA" text-anchor="middle">Tipos inferidos</text>

  <text x="594" y="110" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#63B3ED">type Game = {</text>
  <text x="594" y="125" font-family="system-ui, sans-serif" font-size="9.5" fill="#A0AEC0">  id:      number</text>
  <text x="594" y="139" font-family="system-ui, sans-serif" font-size="9.5" fill="#A0AEC0">  title:   string</text>
  <text x="594" y="153" font-family="system-ui, sans-serif" font-size="9.5" fill="#A0AEC0">  genre:   string</text>
  <text x="594" y="167" font-family="system-ui, sans-serif" font-size="9.5" fill="#A0AEC0">  price:   number</text>
  <text x="594" y="181" font-family="system-ui, sans-serif" font-size="10" fill="#63B3ED">}</text>

  <line x1="594" y1="194" x2="786" y2="194" stroke="#2D3748" stroke-width="1"/>

  <text x="594" y="212" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#F6AD55">type NewGame = {</text>
  <text x="594" y="226" font-family="system-ui, sans-serif" font-size="9.5" fill="#A0AEC0">  id?:     number</text>
  <text x="594" y="240" font-family="system-ui, sans-serif" font-size="9.5" fill="#A0AEC0">  title:   string</text>
  <text x="594" y="254" font-family="system-ui, sans-serif" font-size="9.5" fill="#A0AEC0">  genre:   string</text>
  <text x="594" y="268" font-family="system-ui, sans-serif" font-size="9.5" fill="#A0AEC0">  price:   number</text>
  <text x="594" y="282" font-family="system-ui, sans-serif" font-size="10" fill="#F6AD55">}</text>

  <line x1="594" y1="295" x2="786" y2="295" stroke="#2D3748" stroke-width="1"/>

  <text x="690" y="315" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">Sin casteos manuales</text>
  <text x="690" y="330" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">Sin `as unknown as T`</text>
  <text x="690" y="346" font-family="system-ui, sans-serif" font-size="9" fill="#38A169" text-anchor="middle">✓ TypeScript estricto</text>
  <text x="690" y="361" font-family="system-ui, sans-serif" font-size="9" fill="#38A169" text-anchor="middle">✓ Autocomplete en IDE</text>

  <!-- Footer -->
  <rect x="0" y="382" width="820" height="38" fill="#16213e"/>
  <text x="410" y="399" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">DrizzleORM genera SQL optimizado para SQLite · Sin ORM pesado · Bundle &lt; 30 KB</text>
  <text x="410" y="414" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">drizzle-kit generate → migrations/  →  wrangler d1 migrations apply</text>
</svg>
