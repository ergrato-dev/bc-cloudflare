<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420">
  <!-- Fondo -->
  <rect width="820" height="420" fill="#1a1a2e"/>

  <!-- Título -->
  <rect x="0" y="0" width="820" height="48" fill="#16213e"/>
  <text x="410" y="30" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">D1 — Flujo de Migraciones y Seed</text>
  <text x="410" y="43" font-family="system-ui, sans-serif" font-size="11" fill="#A0AEC0" text-anchor="middle">Semana 05 · wrangler d1 migrations · create · apply --local · apply · execute</text>

  <!-- Separador vertical -->
  <line x1="410" y1="56" x2="410" y2="400" stroke="#2D3748" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- ============================== -->
  <!-- LEFT PANEL: Migration Files -->
  <!-- ============================== -->
  <text x="205" y="72" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#A0AEC0" text-anchor="middle">ARCHIVOS DE MIGRACIÓN</text>

  <!-- File: 0001_init.sql -->
  <rect x="30" y="82" width="358" height="70" rx="7" fill="#16213e" stroke="#2D3748" stroke-width="1"/>
  <rect x="30" y="82" width="358" height="22" rx="7" fill="#2D3748"/>
  <rect x="30" y="93" width="358" height="11" fill="#2D3748"/>
  <text x="209" y="97" font-family="system-ui, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">migrations/0001_init.sql</text>
  <text x="44" y="115" font-family="system-ui, sans-serif" font-size="10" fill="#F6AD55">CREATE TABLE IF NOT EXISTS movies (</text>
  <text x="44" y="129" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0">  id INTEGER PRIMARY KEY AUTOINCREMENT,</text>
  <text x="44" y="143" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0">  title TEXT NOT NULL, genre TEXT NOT NULL</text>

  <!-- File: 0002_add_indexes.sql -->
  <rect x="30" y="162" width="358" height="56" rx="7" fill="#16213e" stroke="#2D3748" stroke-width="1"/>
  <rect x="30" y="162" width="358" height="22" rx="7" fill="#2D3748"/>
  <rect x="30" y="173" width="358" height="11" fill="#2D3748"/>
  <text x="209" y="177" font-family="system-ui, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">migrations/0002_add_indexes.sql</text>
  <text x="44" y="197" font-family="system-ui, sans-serif" font-size="10" fill="#F6AD55">CREATE INDEX IF NOT EXISTS idx_genre</text>
  <text x="44" y="211" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0">  ON movies(genre);</text>

  <!-- seed.sql file -->
  <rect x="30" y="228" width="358" height="56" rx="7" fill="#16213e" stroke="#9F7AEA" stroke-width="1"/>
  <rect x="30" y="228" width="358" height="22" rx="7" fill="#9F7AEA" fill-opacity="0.3"/>
  <rect x="30" y="239" width="358" height="11" fill="#9F7AEA" fill-opacity="0.3"/>
  <text x="209" y="243" font-family="system-ui, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">seed.sql</text>
  <text x="44" y="265" font-family="system-ui, sans-serif" font-size="10" fill="#9F7AEA">INSERT INTO movies (title, director, genre, year)</text>
  <text x="44" y="279" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0">VALUES ('Blade Runner', 'Scott', 'sci-fi', 1982), ...</text>

  <!-- CLI Commands (left panel) -->
  <rect x="30" y="296" width="358" height="86" rx="7" fill="#16213e" stroke="#F38020" stroke-width="1"/>
  <text x="44" y="314" font-family="system-ui, sans-serif" font-size="9.5" fill="#63B3ED">$ wrangler d1 migrations create movies-db "init"</text>
  <text x="44" y="330" font-family="system-ui, sans-serif" font-size="9.5" fill="#63B3ED">$ wrangler d1 migrations apply movies-db --local</text>
  <text x="44" y="346" font-family="system-ui, sans-serif" font-size="9.5" fill="#9F7AEA">$ wrangler d1 execute movies-db --local --file=seed.sql</text>
  <text x="44" y="362" font-family="system-ui, sans-serif" font-size="9.5" fill="#F38020">$ wrangler d1 migrations apply movies-db   # producción</text>
  <text x="44" y="376" font-family="system-ui, sans-serif" font-size="9.5" fill="#A0AEC0">  --remote  # alias explícito</text>

  <!-- ============================== -->
  <!-- RIGHT PANEL: Enviroments -->
  <!-- ============================== -->
  <text x="615" y="72" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#A0AEC0" text-anchor="middle">ENTORNOS</text>

  <!-- Local env -->
  <rect x="430" y="82" width="365" height="110" rx="8" fill="#38A169" fill-opacity="0.1" stroke="#38A169" stroke-width="1.5"/>
  <text x="615" y="103" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#38A169" text-anchor="middle">Local (wrangler dev)</text>

  <rect x="445" y="110" width="335" height="24" rx="5" fill="#16213e"/>
  <text x="463" y="126" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0">.wrangler/state/v3/d1/&lt;db-id&gt;/db.sqlite</text>

  <rect x="445" y="138" width="335" height="22" rx="5" fill="#16213e"/>
  <text x="463" y="153" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0">Efímero en memoria · sin consumir cuota remota</text>

  <text x="615" y="183" font-family="system-ui, sans-serif" font-size="9" fill="#38A169" text-anchor="middle">--local · sin conexión a Cloudflare</text>

  <!-- Remote env -->
  <rect x="430" y="208" width="365" height="110" rx="8" fill="#003682" fill-opacity="0.2" stroke="#003682" stroke-width="1.5"/>
  <text x="615" y="229" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#63B3ED" text-anchor="middle">Producción (Cloudflare D1)</text>

  <rect x="445" y="238" width="335" height="24" rx="5" fill="#16213e"/>
  <text x="463" y="253" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0">database_id: en wrangler.jsonc (desde wrangler d1 create)</text>

  <rect x="445" y="266" width="335" height="22" rx="5" fill="#16213e"/>
  <text x="463" y="281" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0">Persistente · replicado · cuota de producción</text>

  <text x="615" y="308" font-family="system-ui, sans-serif" font-size="9" fill="#63B3ED" text-anchor="middle">sin --local · requiere autenticación wrangler login</text>

  <!-- d1_migrations table note -->
  <rect x="430" y="330" width="365" height="52" rx="8" fill="#16213e" stroke="#9F7AEA" stroke-width="1"/>
  <text x="615" y="350" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#9F7AEA" text-anchor="middle">TABLE d1_migrations</text>
  <text x="615" y="368" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">Wrangler registra cada archivo aplicado — evita re-aplicar</text>

  <!-- Footer -->
  <rect x="0" y="400" width="820" height="20" fill="#16213e"/>
  <text x="410" y="415" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">Siempre aplica en local primero · Las migraciones son irreversibles — usa ADD COLUMN, nunca DROP en producción sin backup</text>
</svg>
