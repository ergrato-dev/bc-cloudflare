<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" width="820" height="440">
  <!-- Fondo -->
  <rect width="820" height="440" fill="#1a1a2e"/>

  <!-- Título -->
  <rect x="0" y="0" width="820" height="48" fill="#16213e"/>
  <text x="410" y="30" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">JWT Auth — Login, Verificación y Contexto</text>
  <text x="410" y="43" font-family="system-ui, sans-serif" font-size="11" fill="#A0AEC0" text-anchor="middle">Semana 03 · hono/jwt — sign · verify · c.set / c.get</text>

  <!-- ============================== -->
  <!-- TOKEN STRUCTURE (top) -->
  <!-- ============================== -->
  <text x="30" y="72" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#A0AEC0">ESTRUCTURA DEL TOKEN JWT</text>

  <rect x="20" y="78" width="780" height="46" rx="8" fill="#16213e" stroke="#2D3748" stroke-width="1"/>
  <!-- Header -->
  <rect x="28" y="86" width="190" height="30" rx="5" fill="#E53E3E" fill-opacity="0.2" stroke="#E53E3E" stroke-width="1"/>
  <text x="123" y="101" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#E53E3E" text-anchor="middle">Header</text>
  <text x="123" y="114" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">{ "alg": "HS256" }</text>
  <!-- Dot -->
  <text x="222" y="104" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">.</text>
  <!-- Payload -->
  <rect x="232" y="86" width="330" height="30" rx="5" fill="#9F7AEA" fill-opacity="0.2" stroke="#9F7AEA" stroke-width="1"/>
  <text x="397" y="101" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#9F7AEA" text-anchor="middle">Payload</text>
  <text x="397" y="114" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">{ "sub": "42", "username": "ana", "exp": 1715003600 }</text>
  <!-- Dot -->
  <text x="566" y="104" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">.</text>
  <!-- Signature -->
  <rect x="576" y="86" width="214" height="30" rx="5" fill="#38A169" fill-opacity="0.2" stroke="#38A169" stroke-width="1"/>
  <text x="683" y="101" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#38A169" text-anchor="middle">Signature</text>
  <text x="683" y="114" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">HMAC(header+payload, JWT_SECRET)</text>

  <!-- ============================== -->
  <!-- FLOW 1: Login (left) -->
  <!-- ============================== -->
  <text x="30" y="144" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#A0AEC0">1 · GENERACIÓN DE TOKEN (LOGIN)</text>

  <!-- Client -->
  <rect x="20" y="152" width="110" height="44" rx="8" fill="#16213e" stroke="#2D3748" stroke-width="1"/>
  <text x="75" y="172" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Cliente</text>
  <text x="75" y="188" font-family="system-ui, sans-serif" font-size="9" fill="#63B3ED" text-anchor="middle">POST /auth/login</text>

  <!-- Arrow → Worker -->
  <line x1="130" y1="174" x2="165" y2="174" stroke="#F38020" stroke-width="1.5"/>
  <polygon points="169,174 161,170 161,178" fill="#F38020"/>
  <text x="148" y="168" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0">{user,pass}</text>

  <!-- Worker (login) -->
  <rect x="170" y="152" width="170" height="44" rx="8" fill="#F38020" fill-opacity="0.15" stroke="#F38020" stroke-width="1.5"/>
  <text x="255" y="170" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#F38020" text-anchor="middle">Worker</text>
  <text x="255" y="184" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">await sign(payload, JWT_SECRET)</text>

  <!-- Arrow → response with token -->
  <line x1="340" y1="174" x2="375" y2="174" stroke="#38A169" stroke-width="1.5"/>
  <polygon points="379,174 371,170 371,178" fill="#38A169"/>
  <text x="358" y="168" font-family="system-ui, sans-serif" font-size="9" fill="#38A169">{ token }</text>

  <!-- Token stored on client -->
  <rect x="380" y="152" width="120" height="44" rx="8" fill="#16213e" stroke="#2D3748" stroke-width="1"/>
  <text x="440" y="172" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Cliente</text>
  <text x="440" y="188" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">guarda el token</text>

  <!-- ============================== -->
  <!-- FLOW 2: Request with token (center) -->
  <!-- ============================== -->
  <text x="30" y="222" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#A0AEC0">2 · REQUEST PROTEGIDO (CON TOKEN VÁLIDO)</text>

  <!-- Client with token -->
  <rect x="20" y="230" width="130" height="52" rx="8" fill="#16213e" stroke="#2D3748" stroke-width="1"/>
  <text x="85" y="250" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Cliente</text>
  <text x="85" y="264" font-family="system-ui, sans-serif" font-size="9" fill="#63B3ED" text-anchor="middle">GET /notes</text>
  <text x="85" y="277" font-family="system-ui, sans-serif" font-size="9" fill="#9F7AEA" text-anchor="middle">Authorization: Bearer ...</text>

  <line x1="150" y1="256" x2="185" y2="256" stroke="#F38020" stroke-width="1.5"/>
  <polygon points="189,256 181,252 181,260" fill="#F38020"/>

  <!-- JWT Middleware -->
  <rect x="190" y="230" width="180" height="52" rx="8" fill="#F38020" fill-opacity="0.15" stroke="#F38020" stroke-width="2"/>
  <text x="280" y="248" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#F38020" text-anchor="middle">JWT Middleware</text>
  <text x="280" y="263" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">await verify(token, JWT_SECRET)</text>
  <text x="280" y="276" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">c.set("jwtPayload", payload)</text>

  <line x1="370" y1="256" x2="405" y2="256" stroke="#38A169" stroke-width="1.5"/>
  <polygon points="409,256 401,252 401,260" fill="#38A169"/>
  <text x="388" y="250" font-family="system-ui, sans-serif" font-size="9" fill="#38A169">✓ válido</text>

  <!-- Handler -->
  <rect x="410" y="230" width="170" height="52" rx="8" fill="#16213e" stroke="#38A169" stroke-width="1.5"/>
  <text x="495" y="248" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#38A169" text-anchor="middle">Route Handler</text>
  <text x="495" y="263" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">c.get("jwtPayload")</text>
  <text x="495" y="277" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">→ { sub, username, role }</text>

  <line x1="580" y1="256" x2="615" y2="256" stroke="#38A169" stroke-width="1.5"/>
  <polygon points="619,256 611,252 611,260" fill="#38A169"/>

  <rect x="620" y="236" width="80" height="30" rx="6" fill="#38A169" fill-opacity="0.2" stroke="#38A169" stroke-width="1.5"/>
  <text x="660" y="255" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#38A169" text-anchor="middle">200 OK</text>

  <!-- ============================== -->
  <!-- FLOW 3: No token / bad token -->
  <!-- ============================== -->
  <text x="30" y="308" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#A0AEC0">3 · SIN TOKEN O TOKEN INVÁLIDO</text>

  <!-- Client without token -->
  <rect x="20" y="316" width="130" height="44" rx="8" fill="#16213e" stroke="#2D3748" stroke-width="1"/>
  <text x="85" y="336" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Cliente</text>
  <text x="85" y="352" font-family="system-ui, sans-serif" font-size="9" fill="#E53E3E" text-anchor="middle">sin Authorization header</text>

  <line x1="150" y1="338" x2="185" y2="338" stroke="#E53E3E" stroke-width="1.5"/>
  <polygon points="189,338 181,334 181,342" fill="#E53E3E"/>

  <!-- JWT Middleware fails -->
  <rect x="190" y="316" width="180" height="44" rx="8" fill="#E53E3E" fill-opacity="0.1" stroke="#E53E3E" stroke-width="2"/>
  <text x="280" y="336" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#E53E3E" text-anchor="middle">JWT Middleware</text>
  <text x="280" y="352" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">throw HTTPException(401)</text>

  <line x1="370" y1="338" x2="405" y2="338" stroke="#E53E3E" stroke-width="1.5"/>
  <polygon points="409,338 401,334 401,342" fill="#E53E3E"/>

  <rect x="410" y="320" width="170" height="36" rx="8" fill="#16213e" stroke="#E53E3E" stroke-width="1.5"/>
  <text x="495" y="336" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#E53E3E" text-anchor="middle">app.onError()</text>
  <text x="495" y="350" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">→ handler NUNCA se ejecuta</text>

  <line x1="580" y1="338" x2="615" y2="338" stroke="#E53E3E" stroke-width="1.5"/>
  <polygon points="619,338 611,334 611,342" fill="#E53E3E"/>

  <rect x="620" y="318" width="130" height="30" rx="6" fill="#E53E3E" fill-opacity="0.2" stroke="#E53E3E" stroke-width="1.5"/>
  <text x="685" y="337" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#E53E3E" text-anchor="middle">401 Unauthorized</text>

  <!-- ============================== -->
  <!-- Variables box -->
  <!-- ============================== -->
  <rect x="20" y="380" width="780" height="48" rx="8" fill="#16213e" stroke="#9F7AEA" stroke-width="1"/>
  <text x="35" y="398" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#9F7AEA">Variables de Contexto</text>
  <text x="35" y="416" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0">Declarar en el tipo de la app:</text>
  <text x="190" y="416" font-family="system-ui, sans-serif" font-size="10" fill="#FFFFFF">type Variables = { jwtPayload: JWTPayload }</text>
  <text x="500" y="416" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0"> → </text>
  <text x="520" y="416" font-family="system-ui, sans-serif" font-size="10" fill="#FFFFFF">new Hono&lt;{ Bindings: Env; Variables: Variables }&gt;()</text>
</svg>
