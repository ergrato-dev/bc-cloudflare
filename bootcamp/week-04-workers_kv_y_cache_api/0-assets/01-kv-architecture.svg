<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" width="820" height="440">
  <!-- Fondo -->
  <rect width="820" height="440" fill="#1a1a2e"/>

  <!-- Título -->
  <rect x="0" y="0" width="820" height="48" fill="#16213e"/>
  <text x="410" y="30" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">Workers KV — Arquitectura y Consistencia Global</text>
  <text x="410" y="43" font-family="system-ui, sans-serif" font-size="11" fill="#A0AEC0" text-anchor="middle">Semana 04 · KV Namespace · get · put · delete · list</text>

  <!-- ============================== -->
  <!-- CLIENTE -->
  <!-- ============================== -->
  <rect x="20" y="80" width="110" height="60" rx="8" fill="#16213e" stroke="#2D3748" stroke-width="1.5"/>
  <text x="75" y="107" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Cliente</text>
  <text x="75" y="123" font-family="system-ui, sans-serif" font-size="10" fill="#63B3ED" text-anchor="middle">HTTP Request</text>

  <!-- Arrow: Client → Worker -->
  <line x1="130" y1="110" x2="205" y2="110" stroke="#F38020" stroke-width="1.5"/>
  <polygon points="209,110 201,106 201,114" fill="#F38020"/>
  <text x="168" y="104" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">GET /products</text>

  <!-- ============================== -->
  <!-- WORKER -->
  <!-- ============================== -->
  <rect x="210" y="62" width="200" height="200" rx="8" fill="#F38020" fill-opacity="0.12" stroke="#F38020" stroke-width="2"/>
  <rect x="210" y="62" width="200" height="32" rx="8" fill="#F38020" fill-opacity="0.3"/>
  <rect x="210" y="82" width="200" height="12" fill="#F38020" fill-opacity="0.3"/>
  <text x="310" y="82" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#F38020" text-anchor="middle">Worker</text>

  <!-- KV Operations inside Worker -->
  <rect x="225" y="100" width="170" height="34" rx="5" fill="#16213e" stroke="#2D3748" stroke-width="1"/>
  <text x="310" y="115" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">KV.get("products:42")</text>
  <text x="310" y="128" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">→ string | null</text>

  <rect x="225" y="142" width="170" height="34" rx="5" fill="#16213e" stroke="#2D3748" stroke-width="1"/>
  <text x="310" y="157" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">KV.put("products:42", val)</text>
  <text x="310" y="170" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">{ expirationTtl: 3600 }</text>

  <rect x="225" y="184" width="170" height="34" rx="5" fill="#16213e" stroke="#2D3748" stroke-width="1"/>
  <text x="310" y="199" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">KV.list({ prefix: "products:" })</text>
  <text x="310" y="212" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">→ keys[], cursor</text>

  <rect x="225" y="226" width="170" height="26" rx="5" fill="#16213e" stroke="#2D3748" stroke-width="1"/>
  <text x="310" y="243" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">KV.delete("products:42")</text>

  <!-- Arrow: Worker → KV -->
  <line x1="410" y1="170" x2="470" y2="170" stroke="#003682" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="474,170 466,166 466,174" fill="#003682"/>
  <text x="440" y="164" font-family="system-ui, sans-serif" font-size="9" fill="#63B3ED" text-anchor="middle">read/write</text>

  <!-- ============================== -->
  <!-- KV NAMESPACE -->
  <!-- ============================== -->
  <rect x="475" y="62" width="220" height="240" rx="8" fill="#003682" fill-opacity="0.2" stroke="#003682" stroke-width="2"/>
  <rect x="475" y="62" width="220" height="32" rx="8" fill="#003682" fill-opacity="0.5"/>
  <rect x="475" y="82" width="220" height="12" fill="#003682" fill-opacity="0.5"/>
  <text x="585" y="82" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">KV Namespace</text>

  <!-- Key-value entries -->
  <rect x="490" y="104" width="190" height="22" rx="4" fill="#16213e"/>
  <text x="500" y="119" font-family="system-ui, sans-serif" font-size="10" fill="#9F7AEA">products:1</text>
  <text x="640" y="119" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0" text-anchor="end">{ id:1, name:"Teclado" }</text>

  <rect x="490" y="130" width="190" height="22" rx="4" fill="#16213e"/>
  <text x="500" y="145" font-family="system-ui, sans-serif" font-size="10" fill="#9F7AEA">products:2</text>
  <text x="640" y="145" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0" text-anchor="end">{ id:2, name:"Monitor" }</text>

  <rect x="490" y="156" width="190" height="22" rx="4" fill="#16213e"/>
  <text x="500" y="171" font-family="system-ui, sans-serif" font-size="10" fill="#9F7AEA">config:theme</text>
  <text x="640" y="171" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0" text-anchor="end">"dark"  TTL:3600s</text>

  <rect x="490" y="182" width="190" height="22" rx="4" fill="#16213e"/>
  <text x="500" y="197" font-family="system-ui, sans-serif" font-size="10" fill="#9F7AEA">session:abc</text>
  <text x="640" y="197" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0" text-anchor="end">{ userId:1 }  TTL:1h</text>

  <rect x="490" y="208" width="190" height="22" rx="4" fill="#16213e"/>
  <text x="500" y="223" font-family="system-ui, sans-serif" font-size="10" fill="#9F7AEA">cache:/products</text>
  <text x="640" y="223" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0" text-anchor="end">[...array]  TTL:300s</text>

  <text x="585" y="258" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">Máx: 25 MB por valor · 512 B por llave</text>
  <text x="585" y="272" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">Namespace: hasta 1 billón de llaves</text>

  <!-- Arrow back: KV → Worker -->
  <line x1="475" y1="120" x2="410" y2="120" stroke="#38A169" stroke-width="1.5"/>
  <polygon points="406,120 414,116 414,124" fill="#38A169"/>
  <text x="440" y="114" font-family="system-ui, sans-serif" font-size="9" fill="#38A169" text-anchor="middle">valor</text>

  <!-- Arrow: Worker → Response -->
  <line x1="210" y1="110" x2="130" y2="110" stroke="#38A169" stroke-width="1.5"/>
  <polygon points="126,110 134,106 134,114" fill="#38A169"/>
  <text x="170" y="104" font-family="system-ui, sans-serif" font-size="9" fill="#38A169" text-anchor="middle">JSON</text>

  <!-- ============================== -->
  <!-- REPLICATION BAR (bottom) -->
  <!-- ============================== -->
  <rect x="20" y="325" width="780" height="90" rx="8" fill="#16213e" stroke="#2D3748" stroke-width="1"/>
  <text x="410" y="347" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">Replicación Global — Consistencia Eventual</text>

  <!-- PoP boxes -->
  <rect x="40" y="358" width="100" height="44" rx="6" fill="#003682" fill-opacity="0.3" stroke="#003682" stroke-width="1"/>
  <text x="90" y="378" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">PoP Madrid</text>
  <text x="90" y="394" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">lectura local</text>

  <rect x="160" y="358" width="100" height="44" rx="6" fill="#003682" fill-opacity="0.3" stroke="#003682" stroke-width="1"/>
  <text x="210" y="378" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">PoP Paris</text>
  <text x="210" y="394" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">lectura local</text>

  <rect x="280" y="358" width="110" height="44" rx="6" fill="#003682" fill-opacity="0.3" stroke="#003682" stroke-width="1"/>
  <text x="335" y="378" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">PoP NYC</text>
  <text x="335" y="394" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">lectura local</text>

  <rect x="410" y="358" width="110" height="44" rx="6" fill="#003682" fill-opacity="0.3" stroke="#003682" stroke-width="1"/>
  <text x="465" y="378" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">PoP Tokyo</text>
  <text x="465" y="394" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">lectura local</text>

  <rect x="540" y="358" width="110" height="44" rx="6" fill="#003682" fill-opacity="0.3" stroke="#003682" stroke-width="1"/>
  <text x="595" y="378" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">PoP São Paulo</text>
  <text x="595" y="394" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">lectura local</text>

  <rect x="670" y="358" width="110" height="44" rx="6" fill="#F38020" fill-opacity="0.2" stroke="#F38020" stroke-width="1"/>
  <text x="725" y="375" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#F38020" text-anchor="middle">Escritura →</text>
  <text x="725" y="390" font-family="system-ui, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">~60s propagación</text>

  <!-- Nota bottom -->
  <rect x="0" y="418" width="820" height="22" fill="#16213e"/>
  <text x="410" y="433" font-family="system-ui, sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">Lecturas desde el PoP más cercano al usuario · Escrituras propagadas globalmente en ~60 segundos</text>
</svg>
